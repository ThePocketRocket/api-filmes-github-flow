name: push-workflow
run-name: ${{ github.actor }}
on:
  push:
    branches:
      - master
      - feature/**
      - bugfix/**
jobs: 
  rodando-aplicacao-push:
    runs-on: ubuntu-latest
    steps:
      - name: Clonando repositório / 
        uses: actions/checkout@v4

      - name: Instalando node
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Instalando dependências
        run: npm install

      - name: Rodando projeto
        run: |
          node index.js &
          sleep 5